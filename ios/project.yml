name: SmallTalkCoach
options:
  bundleIdPrefix: com.smalltalkcoach
settings:
  base:
    IPHONEOS_DEPLOYMENT_TARGET: '17.0'
    SWIFT_VERSION: '5.0'
    GENERATE_INFOPLIST_FILE: YES
targets:
  SmallTalkCoach:
    type: application
    platform: iOS
    sources:
      - path: SmallTalkCoach
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smalltalkcoach.app
        PRODUCT_NAME: SmallTalkCoach
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  SmallTalkCoachTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SmallTalkCoachTests
      - path: ../content/lessons/l01-first-hello.json
        buildPhase: resources
    dependencies:
      - target: SmallTalkCoach
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smalltalkcoach.app.tests
        GENERATE_INFOPLIST_FILE: YES
