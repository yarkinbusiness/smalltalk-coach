name: SmallTalkCoach
options:
  bundleIdPrefix: com.yarkinyavuz
packages:
  Core:
    path: Core
targets:
  SmallTalkCoach:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - SmallTalkCoach
    dependencies:
      - package: Core
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yarkinyavuz.smalltalkcoach
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: SmallTalkCoach
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
